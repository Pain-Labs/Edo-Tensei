name: Publish Extension

# 設定觸發條件：當程式碼 push 到 main 分支，且 package.json 檔案有變動時
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'package.json' # 只有版本號更新時才觸發，避免浪費資源

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Package extension
        run: npx @vscode/vsce package --out edo-tensei.vsix

      - name: Validate Open VSX manifest compatibility
        run: |
          manifest_display_name=$(unzip -p edo-tensei.vsix extension.vsixmanifest | sed -n 's/.*<DisplayName>\(.*\)<\/DisplayName>.*/\1/p' | sed 's/\&amp;/\&/g')
          package_display_name=$(node -p "require('./package.json').displayName")
          if [ "$manifest_display_name" != "$package_display_name" ]; then
            echo "Display name mismatch: extension.vsixmanifest has '$manifest_display_name', package.json has '$package_display_name'."
            exit 1
          fi

      - name: Publish to Marketplace
        run: npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }} --packagePath edo-tensei.vsix

      - name: Publish to Open VSX
        run: npx ovsx publish edo-tensei.vsix -p ${{ secrets.OPEN_VSX_TOKEN }}
